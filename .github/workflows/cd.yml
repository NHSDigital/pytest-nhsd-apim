name: Release
on:
  push:
    branches:
      - main
    paths:
      - "src/pytest_nhsd_apim/**"
      - "pyproject.toml"
      - "setup.py"
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Python 3.13
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: 3.13

      - name: install gnome-keyring
        run: |
          sudo apt-get update
          echo "Available versions of gnome-keyring:"
          apt-cache policy gnome-keyring

          echo "Installing default candidate version"
          sudo apt-get install -y gnome-keyring

      - name: install deps
        run: make install-deps

      - name: install twine
        run: pip install --upgrade pip && pip install twine

      - name: build
        run: make build

      - name: check build
        run: twine check dist/*

      - name: set poetry credentials
        run: poetry config pypi-token.pypi ${{ secrets.PYPI_TOKEN }}

      - name: publish
        run: poetry publish
